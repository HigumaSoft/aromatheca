name: Publish API Docs

on:
    push:
        branches:
            - master
        paths:
            - "pages/**"
            - "docs/api/**"
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    deploy:
        name: Deploy to GitHub Pages
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Checkout aromatheca
              uses: actions/checkout@v4
              with:
                  submodules: false

            - name: Setup SSH for docs submodule
              uses: webfactory/ssh-agent@v0.9.0
              with:
                  ssh-private-key: ${{ secrets.DOCS_DEPLOY_KEY }}

            - name: Override submodule URL to use SSH
              run: |
                  git config --global url."git@github.com:HigumaSoft/aromatheca-docs.git".insteadOf "https://github.com/HigumaSoft/aromatheca-docs.git"

            - name: Checkout docs submodule only
              run: git submodule update --init --depth=1 docs

            - name: Copy core-api.yaml into pages/api
              run: cp docs/api/core-api.yaml pages/api/core-api.yaml

            - name: Setup GitHub Pages
              uses: actions/configure-pages@v4

            - name: Upload pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: pages/

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
